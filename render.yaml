services:
  - type: web
    name: crikex
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --prefix client && npm run build --prefix client && npm install --prefix server
    startCommand: NODE_ENV=production node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
